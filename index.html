<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>めぐる本屋｜しおりを1枚、引く</title>
  <style>
  :root{
    --bg: #fbfaf7;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #e7e5e4;
    --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    --radius: 16px;
  }

  * { box-sizing: border-box; }
  body{
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.75;
  }

  .wrap{
    max-width: 780px;
    margin: 40px auto;
    padding: 0 18px 64px;
  }

  h1{
    font-size: 30px;
    letter-spacing: 0.02em;
    margin: 0 0 8px;
  }

  .hintline{
    margin: 0 0 22px;
    color: var(--muted);
    font-size: 14px;
  }

  label{
    display:block;
    margin: 16px 0 8px;
    font-weight: 600;
    font-size: 14px;
  }

  select{
    width: 100%;
    max-width: 420px;
    padding: 12px 12px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    font-size: 16px;
    outline: none;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  select:focus{
    border-color: #d6d3d1;
    box-shadow: 0 0 0 4px rgba(214, 211, 209, 0.35);
  }

  .actions{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 18px 0 8px;
  }

  button{
    appearance: none;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .02s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
  }
  button:hover{
    border-color: #d6d3d1;
    background: #fafafa;
  }
  button:active{
    transform: translateY(1px);
  }
  button:disabled{
    opacity: .45;
    cursor: not-allowed;
  }

  /* いちばん大事なボタンだけ少し強調 */
  #draw{
    background: #111827;
    color: #fff;
    border-color: #111827;
  }
  #draw:hover{
    background: #0b1220;
    border-color: #0b1220;
  }

  .card{
    margin-top: 18px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
  }

  .meta{
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 10px;
  }

  .title{
    font-size: 18px;
    font-weight: 800;
    margin: 4px 0 10px;
  }

  .msg{
    white-space: pre-wrap;
    font-size: 15px;
  }

  .small{
    color: var(--muted);
    font-size: 12px;
    margin-top: 10px;
  }

  /* スマホ最適化 */
  @media (max-width: 520px){
    .wrap{ margin: 24px auto; padding-bottom: 44px; }
    h1{ font-size: 24px; }
    select{ max-width: 100%; }
    .actions{ gap: 8px; }
    button{ width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>しおりを1枚、引く</h1>
    <p class="hintline">状況とジャンルを選ぶと、しおりが1枚届きます。</p>

    <label for="hint">この本はいつ読みたい？</label>
    <select id="hint">
      <option value="">指定しない</option>
      <option>1日の終わりに</option>
      <option>ちょっと疲れているときに</option>
      <option>元気がほしいときに</option>
      <option>ひとりで静かに読みたい</option>
      <option>読書が久しぶりの人に</option>
      <option>気持ちを切り替えたい</option>
    </select>

    <label for="genre">ジャンル</label>
    <select id="genre">
      <option value="">指定しない</option>
      <option>小説</option>
      <option>エッセイ</option>
      <option>絵本</option>
      <option>詩・短歌</option>
      <option>ノンフィクション</option>
    </select>

    <div class="actions">
      <button id="draw">しおりを1枚、引く</button>
      <button id="again" disabled>もう1枚引く</button>
      <button id="share" disabled>シェア文言をコピー</button>
    </div>

    <div id="result" class="card" style="display:none;"></div>
    <div id="status" class="small"></div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwuPJEHS4jBAD88qFDbpxKsKcMSxl2lkY_W5H80iJW2FH2gK6GheosLgli7Kautm0ouHw/exec";

  const elHint = document.getElementById('hint');
  const elGenre = document.getElementById('genre');
  const elDraw = document.getElementById('draw');
  const elAgain = document.getElementById('again');
  const elShare = document.getElementById('share');
  const elResult = document.getElementById('result');
  const elStatus = document.getElementById('status');

  let lastShareText = '';

  function buildShareText(hint) {
    return `今日引いたのは、\n「${hint}」向けのしおりでした。\n\nめぐる本屋のオンラインしおりから。`;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  async function drawOne() {
    const hint = elHint.value.trim();
    const genre = elGenre.value.trim();
    const url = new URL(API_URL);
    if (hint) url.searchParams.set('hint', hint);
    if (genre) url.searchParams.set('genre', genre);

    elStatus.textContent = '読み込み中…';
    elDraw.disabled = true;
    elAgain.disabled = true;
    elShare.disabled = true;

    try {
      const res = await fetch(url.toString(), { method: 'GET' });
      const json = await res.json();

      if (!json.ok) {
        elResult.style.display = 'block';
        elResult.innerHTML = `<div class="meta">エラー</div><div class="msg">${escapeHtml(json.error || '不明なエラー')}</div>`;
        elStatus.textContent = '';
        elDraw.disabled = false;
        return;
      }

      if (json.found === 0) {
        elResult.style.display = 'block';
        elResult.innerHTML = `<div class="meta">見つかりませんでした</div><div class="msg">${escapeHtml(json.message)}</div>`;
        elStatus.textContent = '';
        elDraw.disabled = false;
        return;
      }

      const d = json.data;
      const authorLine = d.author ? `／${escapeHtml(d.author)}` : '';
      elResult.style.display = 'block';
      elResult.innerHTML = `
        <div class="meta">この本はいつ読みたい？：${escapeHtml(d.hint)}　｜　ジャンル：${escapeHtml(d.genre)}</div>
        <div class="title">『${escapeHtml(d.title)}』${authorLine}</div>
        <div class="msg">${escapeHtml(d.message)}</div>
      `;

      lastShareText = buildShareText(d.hint || '（指定なし）');
      elAgain.disabled = false;
      elShare.disabled = false;
      elStatus.textContent = '';
      elDraw.disabled = false;

    } catch (e) {
      elResult.style.display = 'block';
      elResult.innerHTML = `<div class="meta">エラー</div><div class="msg">通信に失敗しました。もう一度お試しください。</div>`;
      elStatus.textContent = '';
      elDraw.disabled = false;
    }
  }

  elDraw.addEventListener('click', drawOne);
  elAgain.addEventListener('click', drawOne);

  elShare.addEventListener('click', async () => {
    if (!lastShareText) return;
    try {
      await navigator.clipboard.writeText(lastShareText);
      elStatus.textContent = 'シェア文言をコピーしました。';
      setTimeout(() => elStatus.textContent = '', 2000);
    } catch (e) {
      elStatus.textContent = 'コピーできませんでした。手動で選択してください。';
    }
  });
</script>
</body>
</html>
