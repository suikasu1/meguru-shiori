<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>めぐる本屋｜しおりを1枚、引く</title>

  <style>
    :root{
      --bg:#fbf7ef;
      --paper:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#e5e2da;
      --shadow: 0 12px 24px rgba(15, 23, 42, 0.08);

      --accent:#1f5c55;

      --soft-radius: 10px;
      --button-radius: 8px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background:var(--bg);
      color:var(--ink);
      line-height:1.8;
    }

    .wrap{
      max-width: 920px;
      margin: 44px auto;
      padding: 0 18px 80px;
    }

    header small{
      display:block;
      letter-spacing:.12em;
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
    }

    h1{
      font-size:32px;
      margin:0 0 14px;
      letter-spacing:.01em;
    }

    .lead{
      color:var(--muted);
      font-size:15px;
      margin:0 0 26px;
    }

    .panel{
      background: rgba(255,255,255,0.40);
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      padding: 16px 16px 18px;
    }

    .layout{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    label{
      display:block;
      margin: 16px 0 8px;
      font-weight:600;
      font-size:14px;
    }

    select{
      width:100%;
      max-width:520px;
      padding:12px 12px;
      border:1px solid var(--line);
      background:#fff;
      font-size:16px;
      border-radius: var(--soft-radius);
      outline:none;
    }

    select:focus{
      border-color:#d9c9b3;
      box-shadow: 0 0 0 4px rgba(217, 201, 179, 0.20);
    }

    .actions{
      display:flex;
      gap:12px;
      margin:18px 0 10px;
      flex-wrap:wrap;
    }

    button{
      padding:10px 18px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      font-weight:600;
      cursor:pointer;
      border-radius: var(--button-radius);
      transition: background .15s ease, border-color .15s ease, opacity .15s ease;
    }

    button:hover{
      border-color:#d9c9b3;
      background: rgba(255,255,255,0.85);
    }

    button:disabled{
      opacity:.4;
      cursor:not-allowed;
    }

    #draw{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    #draw:hover{
      background:#164842;
      border-color:#164842;
    }

    .status{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }

    /* ===== しおり（結果表示） ===== */

    #result{

  display:none;

  position:relative;

  border-radius:0;

  box-shadow:none;

  background-color:transparent;

}

    /* しおり部分だけ、全端末で縦書き */
   #result.bookmark-vertical{
  width: 220px;
  height: 680px;

  margin: 36px auto 0;
  padding: 0;

  overflow: hidden;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

    /* シチュエーション別背景 */
    #result.theme-night{
      background-image: url("assets/shiori-night.png");
    }

    #result.theme-rest{
      background-image: url("assets/shiori-rest.png");
    }

    #result.theme-pop{
      background-image: url("assets/shiori-pop.png");
    }

    #result.theme-quiet{
      background-image: url("assets/shiori-quiet.png");
    }

    #result.theme-normal{
      background-image: url("assets/shiori-normal.png");
    }

    #result.bookmark-vertical .title{
  font-size:17px;
  font-weight:600;
  line-height:1.65;
  margin:0 0 18px;
  letter-spacing:.04em;
  color:var(--ink);
}

    #result.bookmark-vertical .msg{
      font-size:15px;
      line-height:1.7;
      white-space:pre-wrap;
      color:var(--ink);
    }

    /* 文字が背景に負ける場合の保険 */
    .bookmark-text{
  position:absolute;
  top:90px;
  left:50%;
  transform:translateX(-50%);

  writing-mode: vertical-rl;
  text-orientation: mixed;

  height: 520px;
  width: fit-content;
  max-width: 165px;
  min-width: 120px;

  font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;

  background: rgba(255, 253, 248, 0.38);
  padding: 8px 6px;
  border-radius: 6px;

  overflow: visible;
}
    
    /* 夜だけ、文字を読みやすくするため白背景を少し強める */
    #result.theme-night .bookmark-text{
      background: rgba(255, 253, 248, 0.66);
    }

    @media (max-width: 520px){
  .wrap{
    margin: 28px auto;
    padding: 0 16px 64px;
  }

  h1{
    font-size:26px;
  }

  select{
    max-width:100%;
  }

  button{
    width:100%;
  }

  #result.bookmark-vertical{
    width: 210px;
    height: 650px;
    margin-top: 32px;
    padding: 0;
  }

  .bookmark-text{
  top:82px;
  height:525px;
  width: fit-content;
  max-width:155px;
  min-width:115px;
}

  #result.bookmark-vertical .title{
    font-size:16px;
  }

  #result.bookmark-vertical .msg{
    font-size:14px;
  }
}
    @media (max-height: 520px){
      #result.bookmark-vertical{
        height: 600px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <small>MEGURU BOOKS</small>
      <h1>しおりを1枚、引く</h1>
      <p class="lead">状況とジャンルを選ぶと、しおりが1枚届きます。</p>
    </header>

    <div class="panel">
      <div class="layout">
        <div>
          <label for="hint">この本はいつ読みたい？</label>
          <select id="hint">
            <option value="">指定しない</option>
            <option>1日の終わりに</option>
            <option>ちょっと疲れているときに</option>
            <option>元気がほしいときに</option>
            <option>ひとりで静かに読みたい</option>
            <option>読書が久しぶりの人に</option>
            <option>気持ちを切り替えたい</option>
          </select>
        </div>

        <div>
          <label for="genre">ジャンル</label>
          <select id="genre">
            <option value="">指定しない</option>
            <option>小説</option>
            <option>エッセイ</option>
            <option>絵本</option>
            <option>詩・短歌</option>
            <option>ノンフィクション</option>
          </select>
        </div>

        <div class="actions">
          <button id="draw">しおりを1枚、引く</button>
          <button id="again" disabled>もう1枚引く</button>
          <button id="share" disabled>シェア文言をコピー</button>
        </div>

        <div id="status" class="status"></div>
      </div>
    </div>

    <div id="result" class="bookmark-vertical theme-normal"></div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwuPJEHS4jBAD88qFDbpxKsKcMSxl2lkY_W5H80iJW2FH2gK6GheosLgli7Kautm0ouHw/exec";

  const elHint = document.getElementById("hint");
  const elGenre = document.getElementById("genre");
  const elDraw = document.getElementById("draw");
  const elAgain = document.getElementById("again");
  const elShare = document.getElementById("share");
  const elResult = document.getElementById("result");
  const elStatus = document.getElementById("status");

  let lastShare = "";

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[m]));
  }

  function getThemeByHint(hint){
    if(hint === "1日の終わりに") return "theme-night";
    if(hint === "ちょっと疲れているときに") return "theme-rest";
    if(hint === "元気がほしいときに") return "theme-pop";
    if(hint === "ひとりで静かに読みたい") return "theme-quiet";

    return "theme-normal";
  }

  function setTheme(theme){
    elResult.classList.remove(
      "theme-night",
      "theme-rest",
      "theme-pop",
      "theme-quiet",
      "theme-normal"
    );
    elResult.classList.add(theme);
  }

  function buildShareText(hint, title, author){
    const bookLine = author ? `『${title}』／${author}` : `『${title}』`;
    return `今日引いたのは、\n「${hint}」向けのしおりでした。\n\n${bookLine}\nめぐる本屋のオンラインしおりから。`;
  }

  async function draw(){
    const hint = elHint.value.trim();
    const genre = elGenre.value.trim();

    const url = new URL(API_URL);
    if(hint) url.searchParams.set("hint", hint);
    if(genre) url.searchParams.set("genre", genre);

    elStatus.textContent = "読み込み中…";
    elDraw.disabled = true;
    elAgain.disabled = true;
    elShare.disabled = true;

    try{
      const res = await fetch(url.toString(), { method:"GET" });
      const json = await res.json();

      if(!json.ok){
        setTheme("theme-normal");
        elResult.style.display = "block";
        elResult.innerHTML = `<div class="bookmark-text"><div class="msg">取得できませんでした。</div></div>`;
        elStatus.textContent = "";
        elDraw.disabled = false;
        return;
      }

      if(json.found === 0){
        setTheme(getThemeByHint(hint));
        elResult.style.display = "block";
        elResult.innerHTML = `<div class="bookmark-text"><div class="msg">${esc(json.message || "条件に合うしおりがありません。")}</div></div>`;
        elStatus.textContent = "";
        elDraw.disabled = false;
        return;
      }

      const d = json.data;
      const hintLabel = d.hint ? d.hint : "指定なし";
      const authorLine = d.author ? `／${esc(d.author)}` : "";

      setTheme(getThemeByHint(d.hint));

      elResult.style.display = "block";
      elResult.innerHTML = `
        <div class="bookmark-text">
          <div class="title">『${esc(d.title)}』${authorLine}</div>
          <div class="msg">${esc(d.message)}</div>
        </div>
      `;

      lastShare = buildShareText(hintLabel, d.title, d.author);

      elAgain.disabled = false;
      elShare.disabled = false;
      elDraw.disabled = false;
      elStatus.textContent = "";

    }catch(e){
      setTheme("theme-normal");
      elResult.style.display = "block";
      elResult.innerHTML = `<div class="bookmark-text"><div class="msg">通信に失敗しました。もう一度お試しください。</div></div>`;
      elStatus.textContent = "";
      elDraw.disabled = false;
    }
  }

  elDraw.addEventListener("click", draw);
  elAgain.addEventListener("click", draw);

  elShare.addEventListener("click", async ()=>{
    if(!lastShare) return;

    try{
      await navigator.clipboard.writeText(lastShare);
      elStatus.textContent = "シェア文言をコピーしました。";
      setTimeout(()=> elStatus.textContent = "", 2000);
    }catch(e){
      elStatus.textContent = "コピーできませんでした。";
    }
  });
</script>
</body>
</html>
